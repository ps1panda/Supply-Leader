{% macro dialogModal(props = {}) %}
    {% set props = {
        title: props.title | default(""),
        body: props.body | default(""),
        attrs: props.attrs | default({})
    } %}
    <div
        x-cloak
        x-show="isOpen"
        x-transition:enter="transition duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4 py-6"
        @click.self="close()"
        {{ props.attrs | renderAttrs | safe }}
    >
        <div
            x-show="isOpen"
            x-transition:enter="transition duration-200"
            x-transition:enter-start="scale-95 opacity-0"
            x-transition:enter-end="scale-100 opacity-100"
            x-transition:leave="transition duration-200"
            x-transition:leave-start="scale-100 opacity-100"
            x-transition:leave-end="scale-95 opacity-0"
            class="w-full max-w-md rounded-[var(--radius-card)] bg-white p-6 shadow-xl"
            role="dialog"
            aria-modal="true"
            aria-labelledby="about-company-modal-title"
        >
            <div class="flex items-start justify-between gap-4">
                <h2
                    id="about-company-modal-title"
                    class="text-xl font-semibold leading-none text-text-primary"
                >
                    {{ props.title }}
                </h2>
                <button
                    type="button"
                    class="inline-flex size-10 items-center justify-center rounded-[var(--spacing-radius-control)] border border-border text-text-secondary transition duration-200 hover:bg-surface hover:text-text-primary"
                    @click="close()"
                    aria-label="Close modal"
                >
                    &times;
                </button>
            </div>
            <div class="mt-4 text-sm leading-6 text-text-secondary">
                {{ props.body }}
            </div>
        </div>
    </div>
{% endmacro %}
